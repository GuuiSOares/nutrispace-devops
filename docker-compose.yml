services:
  db-nutrispace:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: db-nutrispace-rm562673
    restart: unless-stopped
    shm_size: 1g
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-Fiap@2tdsvms}
    ports:
      - "1521:1521"
    volumes:
      - nutrispace_data:/opt/oracle/oradata
    networks:
      - nutrispace_net
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s

  api-nutrispace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-nutrispace-rm562673
    restart: unless-stopped
    depends_on:
      db-nutrispace:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//db-nutrispace:1521/xepdb1
      SPRING_DATASOURCE_USERNAME: SYSTEM
      SPRING_DATASOURCE_PASSWORD: ${ORACLE_PASSWORD:-Fiap@2tdsvms}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: oracle.jdbc.OracleDriver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.OracleDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xmx384m -Xms256m}
    networks:
      - nutrispace_net

volumes:
  nutrispace_data:
    name: nutrispace_data

networks:
  nutrispace_net:
    driver: bridge